<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050b1a">
  <title>Flappy Diddler</title>
  <style>
    :root{color-scheme:dark;font-family:ui-rounded,"Arial Rounded MT Bold",system-ui,sans-serif}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#040713;touch-action:none;user-select:none;-webkit-user-select:none}
    #app{position:fixed;inset:0;overflow:hidden;background:#07152c}
    canvas{display:block;width:100%;height:100%;touch-action:none}
    #ambient{display:none}
    .panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(24px,env(safe-area-inset-top)) 22px max(24px,env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(3,6,18,.2),rgba(3,6,18,.72));z-index:2}
    .hidden{display:none!important}
    h1{margin:0 0 7px;color:#fff;font-size:clamp(37px,11vw,58px);line-height:.9;text-align:center;letter-spacing:-2px;text-shadow:0 5px 0 #14101e,0 8px 18px #000}
    .purple{color:#c869ff}
    .subtitle{margin:3px 0 24px;color:#d9dff0;font-size:14px;text-align:center;text-shadow:0 2px 3px #000}
    .mode-title{font-weight:900;margin-bottom:10px;text-transform:uppercase;letter-spacing:1.2px;color:#fff}
    .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(100%,390px);margin-bottom:18px}
    .mode{appearance:none;border:3px solid rgba(255,255,255,.25);border-radius:15px;background:linear-gradient(#27233d,#151426);color:#fff;padding:11px 7px;min-height:61px;font:900 15px/1.05 inherit;box-shadow:0 5px 0 #090813;touch-action:manipulation}
    .mode small{display:block;margin-top:5px;font-size:10px;color:#aaa9bc;font-weight:700}
    .mode.selected{border-color:#d172ff;background:linear-gradient(#6e2c91,#351343);box-shadow:0 5px 0 #1e0828,0 0 18px rgba(202,95,255,.5);transform:translateY(-1px)}
    .start,.action{appearance:none;border:4px solid #2a1401;border-radius:16px;background:linear-gradient(#fff65c 0 35%,#ffc400 36% 100%);color:#231300;padding:14px 28px;min-width:min(100%,280px);font:1000 23px/1 inherit;letter-spacing:.4px;box-shadow:0 7px 0 #8f4800,0 12px 28px rgba(0,0,0,.35);touch-action:manipulation}
    .start:active,.action:active{transform:translateY(5px);box-shadow:0 2px 0 #8f4800}
    .tip{margin-top:18px;font-size:13px;color:#dce1ee;text-align:center;text-shadow:0 2px 3px #000}
    #over{background:rgba(3,5,15,.48);backdrop-filter:blur(2px)}
    .card{width:min(100%,350px);padding:23px 20px 25px;border:4px solid #210c2a;border-radius:22px;background:linear-gradient(145deg,rgba(91,36,116,.97),rgba(24,17,42,.98));box-shadow:0 10px 0 rgba(9,4,16,.8),0 25px 55px rgba(0,0,0,.55);text-align:center}
    .card h2{margin:0;color:#fff;font-size:34px;text-shadow:0 4px 0 #1b0d24}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
    .stat{padding:11px;border:2px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(0,0,0,.25);font-size:12px;color:#cfc8d5}
    .stat b{display:block;font-size:28px;color:#fff}
    .actions{display:flex;flex-direction:column;gap:12px;align-items:center}
    .action.secondary{border-color:#0b0710;background:linear-gradient(#4d445b,#292432);color:#fff;box-shadow:0 6px 0 #0b0710;font-size:17px;padding:11px}
  </style>
</head>
<body>
  <main id="app" aria-label="Flappy Diddler Spiel">
    <canvas id="game"></canvas>
    <div id="ambient" aria-live="polite">Sonne & Uhr werden geladen …</div>
    <section id="menu" class="panel">
      <h1><span class="purple">FLAPPY</span><br>DIDDLER</h1>
      <p class="subtitle">Fliege durch die violetten Röhren!</p>
      <div class="mode-title">Schwierigkeit</div>
      <div class="modes" role="radiogroup" aria-label="Schwierigkeitsgrad">
        <button class="mode selected" data-mode="1" role="radio" aria-checked="true">MODUS 1<small>EXTREM LEICHT</small></button>
        <button class="mode" data-mode="2" role="radio" aria-checked="false">MODUS 2<small>LEICHT</small></button>
        <button class="mode" data-mode="3" role="radio" aria-checked="false">MODUS 3<small>MITTELSCHWER</small></button>
        <button class="mode" data-mode="4" role="radio" aria-checked="false">MODUS 4<small>SCHWER</small></button>
      </div>
      <button id="start" class="start">SPIEL STARTEN</button>
      <div class="tip">Tippe im Spiel auf den Bildschirm, damit der Vogel steigt.</div>
    </section>
    <section id="over" class="panel hidden" aria-live="polite">
      <div class="card">
        <h2>GAME OVER</h2>
        <div class="stats">
          <div class="stat">PUNKTE<b id="finalScore">0</b></div>
          <div class="stat">BESTWERT<b id="bestScore">0</b></div>
        </div>
        <div class="actions">
          <button id="again" class="action">NOCHMAL</button>
          <button id="back" class="action secondary">HAUPTMENÜ</button>
        </div>
      </div>
    </section>
  </main>

        atmosphere.lat=pos.coords.latitude;atmosphere.lon=pos.coords.longitude;atmosphere.place='Dein Standort';loadWeather();
      },()=>{atmosphere.place='Gerätezeit · Standort aus';updateAmbient()},{enableHighAccuracy:false,maximumAge:900000,timeout:9000});
    }
    function begin(){
      initializeAtmosphere();reset();state='playing';menu.classList.add('hidden');over.classList.add('hidden');last=performance.now();flap();
    }
    function flap(){if(state!=='playing')return;bird.vy=settings[mode].flap;beep(560,.035,.025)}
    function beep(freq,dur,vol){
      try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.frequency.value=freq;o.type='square';g.gain.setValueAtTime(vol,audio.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+dur);o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+dur)}catch(e){}
    }
    function playCrashSound(){
      try{crashSound.pause();crashSound.currentTime=0;crashSound.play().catch(()=>{})}catch(e){}
    }
    function hitPipe(p){
      const bx=bird.x-11,by=bird.y-11,bw=23,bh=23,top=p.gapY-p.gap/2,bottom=p.gapY+p.gap/2;
      return bx+bw>p.x&&bx<p.x+p.w&&(by<top||by+bh>bottom);
    }
    function update(dt){
      const s=settings[mode];bird.vy+=s.gravity*dt;bird.y+=bird.vy*dt;
      for(const p of pipes){p.x-=s.speed*dt;if(!p.passed&&p.x+p.w<bird.x){p.passed=true;score++;beep(850,.07,.035)}}
      if(pipes[0].x+pipes[0].w<-20){pipes.shift();pipes.push(newPipe(pipes[pipes.length-1].x+s.spacing))}
      if(bird.y-bird.r<0){bird.y=bird.r;bird.vy=70}
      if(bird.y+bird.r>H-GROUND||pipes.some(hitPipe))gameOver();
    }
    function gameOver(){
      if(state!=='playing')return;state='over';playCrashSound();beep(125,.28,.07);
      const key='flappyDiddlerBest'+mode,best=Math.max(score,Number(localStorage.getItem(key)||0));localStorage.setItem(key,best);
      finalScore.textContent=score;bestScore.textContent=best;
      setTimeout(()=>over.classList.remove('hidden'),360);
    }
    function draw(t){background(t);for(const p of pipes)drawPipe(p);if(state!=='menu')drawBird();if(state==='playing'||state==='over')scoreText()}
    function loop(t){
      const dt=Math.min(.033,(t-last)/1000||0);last=t;if(state==='playing')update(dt);if(atmosphere.lat!==null&&Date.now()-atmosphere.weatherAt>15*60*1000)loadWeather();if(t-ambientAt>1000){ambientAt=t;updateAmbient()}draw(t);requestAnimationFrame(loop)
    }
    // iOS Quick Look, Safari und eingebettete Vorschauen behandeln Touch-Ereignisse
    // unterschiedlich. Diese Bindung akzeptiert echtes Touch und normalen Klick,
    // unterdrückt aber den künstlichen Klick, den iOS nach einem Touch auslöst.
    function bindTap(el,fn){
      let lastTouch=0;
      el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();lastTouch=Date.now();fn(e)},{passive:false});
      el.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();if(Date.now()-lastTouch<650)return;fn(e)});
    }
    document.querySelectorAll('.mode').forEach(btn=>bindTap(btn,()=>{
      mode=Number(btn.dataset.mode);document.querySelectorAll('.mode').forEach(b=>{const yes=b===btn;b.classList.toggle('selected',yes);b.setAttribute('aria-checked',yes)})
    }));
    bindTap(document.getElementById('start'),begin);
    bindTap(document.getElementById('again'),begin);
    bindTap(document.getElementById('back'),()=>{state='menu';over.classList.add('hidden');menu.classList.remove('hidden')});
    let canvasTouch=0;
    canvas.addEventListener('touchstart',e=>{e.preventDefault();canvasTouch=Date.now();flap()},{passive:false});
    canvas.addEventListener('click',e=>{e.preventDefault();if(Date.now()-canvasTouch>650)flap()});
    document.addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='ArrowUp')&&state==='playing'){e.preventDefault();flap()}});
    document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
    addEventListener('resize',resize);resize();makeStars();updateAmbient();requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
