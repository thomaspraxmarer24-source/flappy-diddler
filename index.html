<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050b1a">
  <title>Flappy Diddler</title>
  <style>
    :root{color-scheme:dark;font-family:ui-rounded,"Arial Rounded MT Bold",system-ui,sans-serif}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#040713;touch-action:none;user-select:none;-webkit-user-select:none}
    #app{position:fixed;inset:0;overflow:hidden;background:#07152c}
    canvas{display:block;width:100%;height:100%;touch-action:none}
    #ambient{display:none}
    .panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(24px,env(safe-area-inset-top)) 22px max(24px,env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(3,6,18,.2),rgba(3,6,18,.72));z-index:2}
    .hidden{display:none!important}
    h1{margin:0 0 7px;color:#fff;font-size:clamp(37px,11vw,58px);line-height:.9;text-align:center;letter-spacing:-2px;text-shadow:0 5px 0 #14101e,0 8px 18px #000}
    .purple{color:#c869ff}
    .subtitle{margin:3px 0 24px;color:#d9dff0;font-size:14px;text-align:center;text-shadow:0 2px 3px #000}
    .mode-title{font-weight:900;margin-bottom:10px;text-transform:uppercase;letter-spacing:1.2px;color:#fff}
    .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(100%,390px);margin-bottom:18px}
    .mode{appearance:none;border:3px solid rgba(255,255,255,.25);border-radius:15px;background:linear-gradient(#27233d,#151426);color:#fff;padding:11px 7px;min-height:61px;font:900 15px/1.05 inherit;box-shadow:0 5px 0 #090813;touch-action:manipulation}
    .mode small{display:block;margin-top:5px;font-size:10px;color:#aaa9bc;font-weight:700}
    .mode.selected{border-color:#d172ff;background:linear-gradient(#6e2c91,#351343);box-shadow:0 5px 0 #1e0828,0 0 18px rgba(202,95,255,.5);transform:translateY(-1px)}
    .start,.action{appearance:none;border:4px solid #2a1401;border-radius:16px;background:linear-gradient(#fff65c 0 35%,#ffc400 36% 100%);color:#231300;padding:14px 28px;min-width:min(100%,280px);font:1000 23px/1 inherit;letter-spacing:.4px;box-shadow:0 7px 0 #8f4800,0 12px 28px rgba(0,0,0,.35);touch-action:manipulation}
    .start:active,.action:active{transform:translateY(5px);box-shadow:0 2px 0 #8f4800}
    .tip{margin-top:18px;font-size:13px;color:#dce1ee;text-align:center;text-shadow:0 2px 3px #000}
    #over{background:rgba(3,5,15,.48);backdrop-filter:blur(2px)}
    .card{width:min(100%,350px);padding:23px 20px 25px;border:4px solid #210c2a;border-radius:22px;background:linear-gradient(145deg,rgba(91,36,116,.97),rgba(24,17,42,.98));box-shadow:0 10px 0 rgba(9,4,16,.8),0 25px 55px rgba(0,0,0,.55);text-align:center}
    .card h2{margin:0;color:#fff;font-size:34px;text-shadow:0 4px 0 #1b0d24}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}
    .stat{padding:11px;border:2px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(0,0,0,.25);font-size:12px;color:#cfc8d5}
    .stat b{display:block;font-size:28px;color:#fff}
    .actions{display:flex;flex-direction:column;gap:12px;align-items:center}
    .action.secondary{border-color:#0b0710;background:linear-gradient(#4d445b,#292432);color:#fff;box-shadow:0 6px 0 #0b0710;font-size:17px;padding:11px}
  </style>
</head>
<body>
  <main id="app" aria-label="Flappy Diddler Spiel">
    <canvas id="game"></canvas>
    <div id="ambient" aria-live="polite">Sonne & Uhr werden geladen …</div>
    <section id="menu" class="panel">
      <h1><span class="purple">FLAPPY</span><br>DIDDLER</h1>
      <p class="subtitle">Fliege durch die violetten Röhren!</p>
      <div class="mode-title">Schwierigkeit</div>
      <div class="modes" role="radiogroup" aria-label="Schwierigkeitsgrad">
        <button class="mode selected" data-mode="1" role="radio" aria-checked="true">MODUS 1<small>EXTREM LEICHT</small></button>
        <button class="mode" data-mode="2" role="radio" aria-checked="false">MODUS 2<small>LEICHT</small></button>
        <button class="mode" data-mode="3" role="radio" aria-checked="false">MODUS 3<small>MITTELSCHWER</small></button>
        <button class="mode" data-mode="4" role="radio" aria-checked="false">MODUS 4<small>SCHWER</small></button>
      </div>
      <button id="start" class="start">SPIEL STARTEN</button>
      <div class="tip">Tippe im Spiel auf den Bildschirm, damit der Vogel steigt.</div>
    </section>
    <section id="over" class="panel hidden" aria-live="polite">
      <div class="card">
        <h2>GAME OVER</h2>
        <div class="stats">
          <div class="stat">PUNKTE<b id="finalScore">0</b></div>
          <div class="stat">BESTWERT<b id="bestScore">0</b></div>
        </div>
        <div class="actions">
          <button id="again" class="action">NOCHMAL</button>
          <button id="back" class="action secondary">HAUPTMENÜ</button>
        </div>
      </div>
    </section>
  </main>
  <script>
  (()=>{
    'use strict';
    const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
    const menu=document.getElementById('menu'),over=document.getElementById('over'),ambient=document.getElementById('ambient');
    const finalScore=document.getElementById('finalScore'),bestScore=document.getElementById('bestScore');
    const W=390,H=844,GROUND=46;
    const settings={
      1:{name:'Extrem leicht',speed:92,gap:260,gravity:920,flap:-350,spacing:255},
      2:{name:'Leicht',speed:112,gap:220,gravity:1050,flap:-365,spacing:235},
      3:{name:'Mittelschwer',speed:137,gap:180,gravity:1180,flap:-385,spacing:215},
      4:{name:'Schwer',speed:166,gap:148,gravity:1320,flap:-410,spacing:195}
    };
    let mode=1,state='menu',last=0,score=0,bird,pipes=[],stars=[],audio,ambientAt=0;
    const atmosphere={lat:null,lon:null,cloud:22,code:0,precip:0,place:'Gerätezeit',weatherAt:0};

    function resize(){
      const dpr=Math.min(devicePixelRatio||1,2.5);
      canvas.width=Math.round(innerWidth*dpr);canvas.height=Math.round(innerHeight*dpr);
      canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';
      ctx.setTransform(canvas.width/W,0,0,canvas.height/H,0,0);
    }
    function rng(n){const x=Math.sin(n*999.31)*43758.5453;return x-Math.floor(x)}
    function makeStars(){stars=Array.from({length:165},(_,i)=>({x:rng(i+1)*W,y:rng(i+222)*H*.86,r:rn(i+500,.6,2.1),a:rn(i+700,.38,1)}))}
    function rn(seed,a,b){return a+rng(seed)*(b-a)}
    function mix(a,b,n){return a.map((v,i)=>Math.round(v+(b[i]-v)*n))}
    function rgb(a){return `rgb(${a[0]},${a[1]},${a[2]})`}
    function solar(now){
      const lat=(atmosphere.lat??0)*Math.PI/180,lon=atmosphere.lon??0;
      const start=new Date(now.getFullYear(),0,0),day=Math.floor((now-start)/86400000);
      const hour=now.getHours()+now.getMinutes()/60+now.getSeconds()/3600;
      const gamma=2*Math.PI/365*(day-1+(hour-12)/24);
      const eq=229.18*(.000075+.001868*Math.cos(gamma)-.032077*Math.sin(gamma)-.014615*Math.cos(2*gamma)-.040849*Math.sin(2*gamma));
      const decl=.006918-.399912*Math.cos(gamma)+.070257*Math.sin(gamma)-.006758*Math.cos(2*gamma)+.000907*Math.sin(2*gamma)-.002697*Math.cos(3*gamma)+.00148*Math.sin(3*gamma);
      const tz=-now.getTimezoneOffset()/60,solarMinutes=hour*60+eq+4*lon-60*tz,ha=(solarMinutes/4-180)*Math.PI/180;
      const elevation=Math.asin(Math.sin(lat)*Math.sin(decl)+Math.cos(lat)*Math.cos(decl)*Math.cos(ha));
      return{elevation,daylight:Math.max(0,Math.sin(elevation)),hour};
    }
    function drawCloud(x,y,size,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='#e8edf3';ctx.beginPath();ctx.arc(x,y,size*.21,0,Math.PI*2);ctx.arc(x+size*.25,y-size*.1,size*.28,0,Math.PI*2);ctx.arc(x+size*.53,y,size*.2,0,Math.PI*2);ctx.fillRect(x-size*.22,y,size*1.12,size*.21);ctx.fill();ctx.restore()}
    function background(t=0){
      const now=new Date(),sun=solar(now),cloud=atmosphere.cloud/100;
      const dawn=Math.max(0,Math.min(1,(sun.daylight+.07)*3.2));
      const skyTop=mix([2,7,24],[46,148,224],dawn*(1-cloud*.48)),skyBottom=mix([7,19,34],[142,206,244],dawn*(1-cloud*.6));
      const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,rgb(skyTop));g.addColorStop(.63,rgb(skyBottom));g.addColorStop(1,rgb(mix([7,19,34],[28,91,125],dawn)));ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      const sunX=W*(.5+Math.max(-.43,Math.min(.43,(sun.hour-12)/10))),sunY=260-sun.daylight*184;
      ctx.save();ctx.globalAlpha=.15+.65*sun.daylight*(1-cloud*.55);ctx.fillStyle='#fff7bd';ctx.beginPath();ctx.arc(sunX,sunY,23+sun.daylight*12,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle='#fff6b0';if(sun.elevation>-.08){ctx.beginPath();ctx.arc(sunX,sunY,9,0,Math.PI*2);ctx.fill()}else{ctx.fillStyle='#e3edff';ctx.beginPath();ctx.arc(W*.76,118,10,0,Math.PI*2);ctx.fill();ctx.fillStyle=rgb(skyTop);ctx.beginPath();ctx.arc(W*.79,114,10,0,Math.PI*2);ctx.fill()}ctx.restore();
      if(sun.daylight<.18){for(const s of stars){ctx.globalAlpha=s.a*(.76+.24*Math.sin(t*.002+s.x))*(.3+(1-sun.daylight)*.7);ctx.fillStyle='#fff';ctx.fillRect(Math.round(s.x),Math.round(s.y),s.r,s.r)}ctx.globalAlpha=1}
      for(let i=0;i<Math.ceil(atmosphere.cloud/22);i++)drawCloud((i*116+35)%W,96+(i%3)*49,42+(i%2)*19,.22+cloud*.38);
      skyline(now,sun.daylight);
      ctx.fillStyle='#176922';ctx.fillRect(0,H-GROUND,W,GROUND);
      ctx.fillStyle='#4fc43c';ctx.fillRect(0,H-GROUND,W,8);
      ctx.fillStyle='#0b3d16';ctx.fillRect(0,H-5,W,5);
      ctx.save();ctx.globalAlpha=.45;ctx.fillStyle='#8be25c';
      for(let x=-50;x<W+50;x+=38){ctx.beginPath();ctx.moveTo(x,H-GROUND+9);ctx.lineTo(x+14,H-GROUND+9);ctx.lineTo(x-12,H);ctx.lineTo(x-26,H);ctx.fill()}ctx.restore();
    }
    function skyline(now,daylight){
      const buildings=[[0,690,45,108],[39,655,51,143],[82,708,37,90],[116,670,48,128],[159,727,36,71],[192,645,57,153],[241,700,46,98],[282,624,43,174],[321,679,34,119],[350,590,40,208]];
      ctx.fillStyle=rgb(mix([5,12,22],[35,61,74],daylight*.78));
      for(let i=0;i<buildings.length;i++){let [x,y,w,h]=buildings[i];ctx.fillRect(x,y,w,h);if(i===9){ctx.fillRect(x+17,y-30,3,30);ctx.fillRect(x+3,y-12,34,12)}}
      ctx.fillStyle=`rgba(255,232,146,${.2+.48*(1-daylight)})`;
      for(let i=0;i<buildings.length;i++){let [x,y,w,h]=buildings[i];for(let yy=y+15;yy<y+h-10;yy+=17)for(let xx=x+8;xx<x+w-5;xx+=14)if((i+xx+yy)%4!==0)ctx.fillRect(xx,yy,4,6)}
      drawClockTower(now,daylight);
    }
    function drawClockTower(now,daylight){
      const x=276,y=H-GROUND-242,w=45,h=192;
      ctx.fillStyle=rgb(mix([11,14,25],[83,77,69],daylight*.75));ctx.fillRect(x,y,w,h);ctx.fillStyle=rgb(mix([17,10,27],[78,55,51],daylight*.7));ctx.beginPath();ctx.moveTo(x-8,y);ctx.lineTo(x+w/2,y-43);ctx.lineTo(x+w+8,y);ctx.fill();ctx.fillRect(x+w/2-3,y-43,6,43);
      ctx.fillStyle='#efe7c8';ctx.beginPath();ctx.arc(x+w/2,y+43,15,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#343128';ctx.lineWidth=2;ctx.stroke();
      const minute=now.getMinutes()+now.getSeconds()/60,hour=(now.getHours()%12)+minute/60;ctx.strokeStyle='#25201d';ctx.lineCap='round';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(x+w/2,y+43);ctx.lineTo(x+w/2+Math.sin(hour*Math.PI/6)*7,y+43-Math.cos(hour*Math.PI/6)*7);ctx.moveTo(x+w/2,y+43);ctx.lineTo(x+w/2+Math.sin(minute*Math.PI/30)*11,y+43-Math.cos(minute*Math.PI/30)*11);ctx.stroke();
      ctx.fillStyle=`rgba(255,230,146,${.25+.5*(1-daylight)})`;for(let yy=y+80;yy<y+h-12;yy+=20)ctx.fillRect(x+9,yy,6,8);
    }
    function pipeGradient(x,w){const g=ctx.createLinearGradient(x,0,x+w,0);g.addColorStop(0,'#190d25');g.addColorStop(.22,'#3d1752');g.addColorStop(.47,'#8d41b1');g.addColorStop(.6,'#58216f');g.addColorStop(1,'#12091b');return g}
    function drawPipe(p){
      const cap=14,lip=10,topH=p.gapY-p.gap/2,bottomY=p.gapY+p.gap/2;
      ctx.fillStyle='#09070d';ctx.fillRect(p.x-3,0,p.w+6,topH+4);ctx.fillRect(p.x-3,bottomY-4,p.w+6,H-bottomY);
      ctx.fillStyle=pipeGradient(p.x,p.w);ctx.fillRect(p.x,0,p.w,topH-lip);ctx.fillRect(p.x,bottomY+lip,p.w,H-bottomY-lip);
      ctx.fillStyle=pipeGradient(p.x-cap/2,p.w+cap);ctx.fillRect(p.x-cap/2,topH-lip,p.w+cap,lip);ctx.fillRect(p.x-cap/2,bottomY,p.w+cap,lip);
      ctx.fillStyle='rgba(229,139,255,.28)';ctx.fillRect(p.x+p.w*.26,0,5,Math.max(0,topH-lip));ctx.fillRect(p.x+p.w*.26,bottomY+lip,5,H-bottomY-lip);
      ctx.fillStyle='rgba(255,185,255,.45)';ctx.fillRect(p.x-cap/2+10,topH-lip+2,Math.min(34,p.w-10),2);ctx.fillRect(p.x-cap/2+10,bottomY+2,Math.min(34,p.w-10),2);
    }
    function pixel(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h)}
    function drawBird(){
      ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(Math.max(-.38,Math.min(.65,bird.vy/650)));
      const flap=state==='playing'&&Math.sin(performance.now()/75)>0;
      pixel(-20,-15,28,30,'#3b2100');pixel(-16,-18,23,4,'#3b2100');pixel(7,-11,12,22,'#3b2100');
      pixel(-15,-15,22,29,'#ffe900');pixel(-11,-19,14,6,'#fff43c');pixel(2,-12,8,19,'#ffe900');
      pixel(-5,-13,8,10,'#fff');pixel(-1,-10,3,7,'#171008');
      pixel(8,-6,13,5,'#552000');pixel(9,-4,12,4,'#ff7c15');pixel(10,2,9,3,'#e64f0b');
      pixel(-22,flap?-5:2,12,6,'#3b2100');pixel(-20,flap?-8:-1,10,8,'#ffb600');pixel(-14,flap?-4:3,9,8,'#fff000');
      pixel(-11,14,4,5,'#3b2100');pixel(-5,14,4,5,'#3b2100');
      ctx.restore();
    }
    function scoreText(){
      ctx.save();ctx.textAlign='center';ctx.textBaseline='top';ctx.font='900 68px Impact,Arial Black,sans-serif';ctx.lineJoin='miter';ctx.lineWidth=13;ctx.strokeStyle='#08080b';ctx.strokeText(String(score),W/2,45);ctx.fillStyle='#fff';ctx.fillText(String(score),W/2,45);ctx.restore();
    }
    function reset(){
      score=0;bird={x:105,y:H*.47,vy:0,r:13};pipes=[];
      const s=settings[mode];
      for(let i=0;i<4;i++)pipes.push(newPipe(W+115+i*s.spacing));
    }
    function newPipe(x){
      const s=settings[mode],margin=s.gap/2+70,usable=H-GROUND-margin*2;
      return{x,w:68,gap:s.gap,gapY:margin+Math.random()*Math.max(20,usable),passed:false};
    }
    function weatherLabel(){
      if(atmosphere.precip>.05)return 'Regen';
      if(atmosphere.code>=51)return 'Niederschlag';
      if(atmosphere.cloud>75)return 'Bedeckt';
      if(atmosphere.cloud>35)return 'Wolkig';
      return 'Klar';
    }
    function updateAmbient(){
      const time=new Intl.DateTimeFormat('de-AT',{hour:'2-digit',minute:'2-digit'}).format(new Date());
      ambient.textContent=`${time} · ${weatherLabel()} · ${atmosphere.place}`;
    }
    async function loadWeather(){
      if(atmosphere.lat===null||atmosphere.lon===null)return;
      try{
        const url=`https://api.open-meteo.com/v1/forecast?latitude=${atmosphere.lat.toFixed(4)}&longitude=${atmosphere.lon.toFixed(4)}&current=cloud_cover,weather_code,precipitation&timezone=auto`;
        const data=await fetch(url,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error('weather');return r.json()});
        atmosphere.cloud=data.current?.cloud_cover??atmosphere.cloud;atmosphere.code=data.current?.weather_code??0;atmosphere.precip=data.current?.precipitation??0;atmosphere.weatherAt=Date.now();updateAmbient();
      }catch(e){atmosphere.place='Standort · Wetter nicht verfügbar';updateAmbient()}
    }
    function initializeAtmosphere(){
      if(!navigator.geolocation){atmosphere.place='Gerätezeit';updateAmbient();return}
      navigator.geolocation.getCurrentPosition(pos=>{
        atmosphere.lat=pos.coords.latitude;atmosphere.lon=pos.coords.longitude;atmosphere.place='Dein Standort';loadWeather();
      },()=>{atmosphere.place='Gerätezeit · Standort aus';updateAmbient()},{enableHighAccuracy:false,maximumAge:900000,timeout:9000});
    }
    function begin(){
      initializeAtmosphere();reset();state='playing';menu.classList.add('hidden');over.classList.add('hidden');last=performance.now();flap();
    }
    function flap(){if(state!=='playing')return;bird.vy=settings[mode].flap;beep(560,.035,.025)}
    function beep(freq,dur,vol){
      try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.frequency.value=freq;o.type='square';g.gain.setValueAtTime(vol,audio.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+dur);o.connect(g);g.connect(audio.destination);o.start();o.stop(audio.currentTime+dur)}catch(e){}
    }
    function hitPipe(p){
      const bx=bird.x-11,by=bird.y-11,bw=23,bh=23,top=p.gapY-p.gap/2,bottom=p.gapY+p.gap/2;
      return bx+bw>p.x&&bx<p.x+p.w&&(by<top||by+bh>bottom);
    }
    function update(dt){
      const s=settings[mode];bird.vy+=s.gravity*dt;bird.y+=bird.vy*dt;
      for(const p of pipes){p.x-=s.speed*dt;if(!p.passed&&p.x+p.w<bird.x){p.passed=true;score++;beep(850,.07,.035)}}
      if(pipes[0].x+pipes[0].w<-20){pipes.shift();pipes.push(newPipe(pipes[pipes.length-1].x+s.spacing))}
      if(bird.y-bird.r<0){bird.y=bird.r;bird.vy=70}
      if(bird.y+bird.r>H-GROUND||pipes.some(hitPipe))gameOver();
    }
    function gameOver(){
      if(state!=='playing')return;state='over';beep(125,.28,.07);
      const key='flappyDiddlerBest'+mode,best=Math.max(score,Number(localStorage.getItem(key)||0));localStorage.setItem(key,best);
      finalScore.textContent=score;bestScore.textContent=best;
      setTimeout(()=>over.classList.remove('hidden'),360);
    }
    function draw(t){background(t);for(const p of pipes)drawPipe(p);if(state!=='menu')drawBird();if(state==='playing'||state==='over')scoreText()}
    function loop(t){
      const dt=Math.min(.033,(t-last)/1000||0);last=t;if(state==='playing')update(dt);if(atmosphere.lat!==null&&Date.now()-atmosphere.weatherAt>15*60*1000)loadWeather();if(t-ambientAt>1000){ambientAt=t;updateAmbient()}draw(t);requestAnimationFrame(loop)
    }
    // iOS Quick Look, Safari und eingebettete Vorschauen behandeln Touch-Ereignisse
    // unterschiedlich. Diese Bindung akzeptiert echtes Touch und normalen Klick,
    // unterdrückt aber den künstlichen Klick, den iOS nach einem Touch auslöst.
    function bindTap(el,fn){
      let lastTouch=0;
      el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();lastTouch=Date.now();fn(e)},{passive:false});
      el.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();if(Date.now()-lastTouch<650)return;fn(e)});
    }
    document.querySelectorAll('.mode').forEach(btn=>bindTap(btn,()=>{
      mode=Number(btn.dataset.mode);document.querySelectorAll('.mode').forEach(b=>{const yes=b===btn;b.classList.toggle('selected',yes);b.setAttribute('aria-checked',yes)})
    }));
    bindTap(document.getElementById('start'),begin);
    bindTap(document.getElementById('again'),begin);
    bindTap(document.getElementById('back'),()=>{state='menu';over.classList.add('hidden');menu.classList.remove('hidden')});
    let canvasTouch=0;
    canvas.addEventListener('touchstart',e=>{e.preventDefault();canvasTouch=Date.now();flap()},{passive:false});
    canvas.addEventListener('click',e=>{e.preventDefault();if(Date.now()-canvasTouch>650)flap()});
    document.addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='ArrowUp')&&state==='playing'){e.preventDefault();flap()}});
    document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
    addEventListener('resize',resize);resize();makeStars();updateAmbient();requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
